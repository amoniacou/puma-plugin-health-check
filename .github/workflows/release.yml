name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
      - name: Build gem
        run: gem build puma-plugin-health-check.gemspec
      - name: Push to RubyGems
        uses: rubygems/release-gem@v1
